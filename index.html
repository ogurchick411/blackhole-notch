<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100vw;
      height: 100vh;
    }
    .notch {
      width: 270px;
      height: 38px;
      background: black;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .notch:hover {
      width: 400px;
      height: 80px;
    }
  </style>
</head>
<body>
  <div class="notch"></div>
</body>
</html>
