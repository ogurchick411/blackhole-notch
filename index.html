<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackhole Notch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="island" class="notch">
    
    <div id="miniArt" class="mini-art"></div>

    <div class="mini-eq equalizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div id="dropZone" class="drop-zone">
      <span id="dropText" class="drop-text">Drop file here</span>
    </div>

    <div class="player-container">
      
      <div class="top-section">
        <div class="meta-box">
          <div id="albumArt" class="album-art-full"></div>
          <div class="track-info">
            <div id="trackTitle" class="track-title">Not Playing</div>
            <div id="trackArtist" class="track-artist">Select a song</div>
          </div>
        </div>

        <div class="main-eq equalizer">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>

      <div id="timelineContainer" class="timeline-container">
        <div id="timelineBarWrapper" class="timeline-bar-wrapper">
          <div class="timeline-bar">
            <div id="timelineProgress" class="timeline-progress"></div>
            <div id="timelineHandle" class="timeline-handle"></div>
          </div>
        </div>
        <div class="time-labels">
          <span id="timeCurrent">0:00</span>
          <span id="timeRemaining">-0:00</span>
        </div>
      </div>

      <div class="bottom-section">
        <div class="controls-wrapper">
          <button id="btnPrev" class="btn"><div class="icon-prev"></div></button>
          <button id="btnPlayPause" class="btn"><div id="playPauseIcon" class="icon-play"></div></button>
          <button id="btnNext" class="btn"><div class="icon-next"></div></button>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
