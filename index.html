<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="notch" id="island">
    <div class="mini-art" id="miniArt"></div>
    
    <div class="player-container">
      <div class="top-section">
        <div class="meta-box">
          <div class="album-art-full" id="albumArt"></div>
          <div class="track-info">
            <div class="track-title" id="trackTitle"></div>
            <div class="track-artist" id="trackArtist"></div>
          </div>
        </div>
        
        <div class="equalizer main-eq">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
      
      <div class="timeline-container" id="timelineContainer">
        <div class="timeline-bar-wrapper" id="timelineBarWrapper">
          <div class="timeline-bar">
            <div class="timeline-progress" id="timelineProgress"></div>
            <div class="timeline-handle" id="timelineHandle"></div>
          </div>
        </div>
        <div class="time-labels">
          <span id="timeCurrent">0:00</span>
          <span id="timeRemaining">-0:00</span>
        </div>
      </div>

      <div class="bottom-section">
        <div class="controls-wrapper">
          <button class="btn" id="btnPrev"><div class="icon-prev"></div></button>
          <button class="btn" id="btnPlayPause"><div id="playPauseIcon" class="icon-pause"></div></button>
          <button class="btn" id="btnNext"><div class="icon-next"></div></button>
        </div>
      </div>
    </div>
    
    <div class="equalizer mini-eq" id="miniEq">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const trackTitle = document.getElementById('trackTitle');
    const trackArtist = document.getElementById('trackArtist');
    const albumArt = document.getElementById('albumArt');
    const miniArt = document.getElementById('miniArt');
    const progress = document.getElementById('timelineProgress');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeRemaining = document.getElementById('timeRemaining');

    document.getElementById('btnPrev').addEventListener('click', () => {
      ipcRenderer.send('music-control', 'prev');
    });

    document.getElementById('btnPlayPause').addEventListener('click', () => {
      ipcRenderer.send('music-control', 'playpause');
    });

    document.getElementById('btnNext').addEventListener('click', () => {
      ipcRenderer.send('music-control', 'next');
    });

    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    ipcRenderer.on('music-update', (event, data) => {
      if (!data.playing) return;

      trackTitle.textContent = data.title;
      trackArtist.textContent = data.artist;

      if (data.duration > 0) {
        const percent = (data.position / data.duration) * 100;
        progress.style.width = `${percent}%`;
        timeCurrent.textContent = formatTime(data.position);
        timeRemaining.textContent = `-${formatTime(data.duration - data.position)}`;
      }
    });

    ipcRenderer.on('music-art-ready', () => {
      const artUrl = `file:///tmp/notch_cover.png?${new Date().getTime()}`;
      albumArt.style.backgroundImage = `url('${artUrl}')`;
      miniArt.style.backgroundImage = `url('${artUrl}')`;
    });
  </script>
</body>
</html>
