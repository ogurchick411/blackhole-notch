<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100vw;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }
    
    .notch {
      width: 180px; 
      height: 32px; 
      background: #000000 !important;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }
    
    .notch.music-active {
      width: 270px; 
    }
    
    .notch.expanded {
      width: 540px !important;  
      height: 130px !important; 
      border-bottom-left-radius: 32px !important;
      border-bottom-right-radius: 32px !important;
      padding: 0 24px;
    }

    .mini-art {
      width: 18px;
      height: 18px;
      background: #1db954;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .notch.music-active .mini-art {
      opacity: 1;
    }

    .player-container {
      display: flex;
      align-items: center;
      width: 100%;
      height: 100%;
      color: white;
      justify-content: space-between;
      display: none;
    }

    .notch.expanded .player-container {
      display: flex;
    }

    .notch.expanded .mini-art,
    .notch.expanded .mini-eq {
      display: none !important;
    }

    .meta-box {
      display: flex;
      align-items: center;
      max-width: 55%;
    }

    .album-art-full {
      width: 65px;
      height: 65px;
      background: #1db954;
      border-radius: 16px;
      margin-right: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .track-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      white-space: nowrap;
    }

    .track-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .track-artist {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      text-overflow: ellipsis;
      overflow: hidden;
    }
 
    .controls-wrapper {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .btn {
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .btn:hover {
      opacity: 1;
    }

    .btn:active {
      transform: scale(0.88);
    }
 
    .icon-prev, .icon-next {
      width: 18px;
      height: 14px;
      background: currentColor;
      clip-path: polygon(0% 50%, 50% 0%, 50% 35%, 100% 0%, 100% 100%, 50% 65%, 50% 100%);
    }

    .icon-next {
      transform: rotate(180deg);
    }

    .icon-play {
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-left: 16px solid currentColor;
      border-bottom: 10px solid transparent;
      margin-left: 3px;
    }

    .icon-pause {
      display: flex;
      gap: 5px;
    }
    .icon-pause::before, .icon-pause::after {
      content: '';
      width: 5px;
      height: 18px;
      background: currentColor;
      border-radius: 2px;
    }

    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
    }

    .mini-eq {
      height: 14px;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .notch.music-active .mini-eq {
      opacity: 1;
    }

    .bar {
      width: 2px;
      background-color: #1db954;
      border-radius: 1px;
      height: 3px;
    }

    .player-container .equalizer {
      margin-bottom: 12px;
    }

    .player-container .bar {
      width: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="notch" id="island">
    <div class="mini-art"></div>
    
    <div class="player-container">
      <div class="meta-box">
        <div class="album-art-full" id="albumArt"></div>
        <div class="track-info">
          <div class="track-title" id="trackTitle">Nothing Playing</div>
          <div class="track-artist" id="trackArtist">Start playing music</div>
        </div>
      </div>
      
      <div class="controls-wrapper">
        <button class="btn" id="btnPrev"><div class="icon-prev"></div></button>
        <button class="btn" id="btnPlayPause"><div id="playPauseIcon" class="icon-pause"></div></button>
        <button class="btn" id="btnNext"><div class="icon-next"></div></button>
      </div>

      <div class="equalizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
    
    <div class="equalizer mini-eq" id="miniEq">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const island = document.getElementById('island');
    
    const fullBars = document.querySelectorAll('.player-container .bar');
    const miniBars = document.querySelectorAll('.mini-eq .bar');
    const playPauseIcon = document.getElementById('playPauseIcon');

    let animationId;
    let isAnimating = false;
    let hasMusic = false;
    let currentStatus = 'PAUSED';

    function renderEqualizer() {
        if (!isAnimating) return;

        fullBars.forEach((bar, i) => {
            const base = [14, 18, 12, 16][i] || 15;
            bar.style.height = `${Math.sin(Date.now() / 200 + i) * (base / 2) + (base / 2) + 4}px`;
        });
        
        miniBars.forEach((bar, i) => {
            const base = [8, 10, 7, 9][i] || 8;
            bar.style.height = `${Math.sin(Date.now() / 150 + i) * (base / 2) + (base / 2) + 3}px`;
        });

        animationId = requestAnimationFrame(renderEqualizer);
    }

    function freezeEqualizer() {
        isAnimating = false;
        cancelAnimationFrame(animationId);
        fullBars.forEach(bar => bar.style.height = '3px');
        miniBars.forEach(bar => bar.style.height = '3px');
    }

    window.addEventListener('mousemove', (e) => {
        const rect = island.getBoundingClientRect();
        const isInside = e.clientY <= rect.bottom && e.clientX >= rect.left && e.clientX <= rect.right;
        
        if (isInside) {
            ipcRenderer.send('set-ignore-mouse-events', false);
            if (hasMusic && !island.classList.contains('expanded')) {
                ipcRenderer.send('trigger-haptic');
                ipcRenderer.send('resize-window', 540, 150);
                island.classList.add('expanded');
            }
        } else {
            if (island.classList.contains('expanded')) {
                island.classList.remove('expanded');
                const defaultWidth = hasMusic ? 270 : 180;
                ipcRenderer.send('resize-window', defaultWidth, 32);
                ipcRenderer.send('set-ignore-mouse-events', true, { forward: true });
            }
        }
    });

    document.getElementById('albumArt').addEventListener('click', () => {
        ipcRenderer.send('open-apple-music');
    });

    document.getElementById('btnPlayPause').addEventListener('click', () => {
        if (currentStatus === 'PLAYING') {
            currentStatus = 'PAUSED';
            playPauseIcon.className = 'icon-play';
            freezeEqualizer();
        } else {
            currentStatus = 'PLAYING';
            playPauseIcon.className = 'icon-pause';
            isAnimating = true;
            renderEqualizer();
        }
        ipcRenderer.send('music-control', 'playpause');
    });

    document.getElementById('btnNext').addEventListener('click', () => {
        ipcRenderer.send('music-control', 'next');
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
        ipcRenderer.send('music-control', 'prev');
    });

    ipcRenderer.on('music-update', (event, data) => {
        const titleEl = document.getElementById('trackTitle');
        const artistEl = document.getElementById('trackArtist');

        if (data.playing) {
            hasMusic = true;
            titleEl.innerText = data.title;
            artistEl.innerText = data.artist;
            island.classList.add('music-active');
            
            if (!island.classList.contains('expanded')) {
                ipcRenderer.send('resize-window', 270, 32);
            }
            
            currentStatus = data.status;
            if (data.status === 'PLAYING') {
                playPauseIcon.className = 'icon-pause';
                if (!isAnimating) {
                    isAnimating = true;
                    renderEqualizer();
                }
            } else {
                playPauseIcon.className = 'icon-play';
                freezeEqualizer();
            }
        } else {
            hasMusic = false;
            titleEl.innerText = "Nothing Playing";
            artistEl.innerText = "Start playing music";
            island.classList.remove('music-active', 'expanded');
            ipcRenderer.send('resize-window', 180, 32);
            freezeEqualizer();
        }
    });
  </script>
</body>
</html>
